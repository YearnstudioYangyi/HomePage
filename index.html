<head>

    <meta name="description" content="阳毅 (YearnstudioYangyi) 的个人主页。专注于后端开发与运维，分享创意项目与技术见解。">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* 全局模糊遮罩 */
        #global-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(0px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            z-index: 15; 
        }

        body.blur-active #global-overlay {
            opacity: 1;
            backdrop-filter: blur(8px);
        }

        /* 页面包装器 */
        #page-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 星系容器 */
        #solar-system {
            position: absolute;
            width: 0;
            height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 1.8s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 20; 
        }

        /* 桌面端平移 */
        @media (min-width: 768px) {
            .shifted #solar-system {
                transform: translateX(-28vw);
            }
        }

        /* 移动端平移 */
        @media (max-width: 767px) {
            .shifted #solar-system {
                transform: translateY(-22vh) scale(0.75);
            }
        }

        /* 轨道 */
        .orbit {
            position: absolute;
            border: 1px dashed var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }

        body.blur-active .orbit {
            opacity: 0.1;
            filter: blur(3px);
        }

        /* 中心头像 */
        .avatar-center {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            z-index: 100;
            box-shadow: 0 0 50px rgba(255,255,255,0.05);
            background: #111;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            left: 0;
            top: 0;
            transition: filter 0.5s ease, opacity 0.5s ease;
        }

        body.blur-active .avatar-center {
            filter: blur(5px);
            opacity: 0.3;
        }

        /* 行星容器 */
        .planet-container {
            position: absolute;
            transform-origin: 0 0;
            z-index: 20;
            left: 0;
            top: 0;
            transition: filter 0.5s ease, opacity 0.5s ease;
        }

        body.blur-active .planet-container:not(:has(.expanded)) {
            filter: blur(8px);
            opacity: 0.2;
            pointer-events: none;
        }

        .planet-wrapper {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
            transition: transform 0.3s ease;
        }

        .planet-wrapper.expanded {
            z-index: 999;
        }

        .planet-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-size: 60%;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #1a1a1a;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 卡片详情 - 默认向右展开逻辑 */
        .planet-card {
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%) scaleX(0);
            transform-origin: left center;
            height: 52px;
            width: 52px;
            background: #ffffff; 
            border-radius: 26px;
            display: flex;
            align-items: center;
            padding: 0;
            overflow: hidden;
            color: #000;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .planet-wrapper.expanded .planet-card {
            width: 320px;
            height: 80px;
            padding: 0 15px;
            border-radius: 14px;
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) scaleX(1);
        }

        /* 移动端向左展开逻辑：独立的原点控制 */
        @media (max-width: 767px) {
            .planet-card.expand-left {
                left: auto;
                right: -10px;
                transform-origin: right center;
            }

            .planet-wrapper.expanded .planet-card.expand-left {
                flex-direction: row-reverse;
                transform: translateY(-50%) scaleX(1);
            }

            .planet-wrapper.expanded .planet-card.expand-left .card-info {
                margin-left: 0;
                margin-right: 60px;
                text-align: right;
            }
        }

        .planet-wrapper.expanded .planet-icon {
            transform: scale(0.8);
            background-color: #000;
            margin-left: -8px;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
        }

        @media (max-width: 767px) {
            .planet-wrapper.expanded:has(.expand-left) .planet-icon {
                margin-left: 0;
                margin-right: -8px;
            }
        }

        .card-info {
            margin-left: 60px;
            display: flex;
            flex-direction: column;
        }

        /* 文字区域 */
        #hero-content {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) translateX(150px);
            transition: 
                opacity 1.5s cubic-bezier(0.7, 0, 0.3, 1) 0.8s, 
                transform 1.8s cubic-bezier(0.7, 0, 0.3, 1) 0.8s;
        }

        @media (min-width: 768px) {
            #hero-content {
                left: calc(50% + 15vw); 
                min-width: 450px;
                max-width: calc(45vw - 40px); 
                text-align: left;
            }
            .shifted #hero-content {
                opacity: 1;
                pointer-events: auto;
                transform: translate(0, -50%); 
            }
        }

        @media (max-width: 767px) {
            #hero-content {
                left: 50%;
                bottom: 5%;
                top: auto;
                transform: translateX(-50%) translateY(30px);
                width: 90vw;
                text-align: center;
            }
            .shifted #hero-content {
                opacity: 1;
                pointer-events: auto;
                transform: translateX(-50%) translateY(0);
            }
        }

        body.blur-active #hero-content {
            opacity: 0.3;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 2rem;
            align-items: flex-start;
        }

        @media (max-width: 767px) {
            .nav-list {
                align-items: center;
                margin-top: 1.5rem;
            }
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.8rem 3.5rem;
            color: white;
            border-radius: 8px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            transform: scale(1.05);
        }
    </style>
</head>

    <script>
        /* ============================
           原始逻辑：星系系统
           ============================ */
        const planetData = [
            { name: "GitHub", ico: "https://cdn.simpleicons.org/github/white", desc: "我的Github主页", url: "https://github.com/YearnstudioYangyi" },
            { name: "C/C++", ico: "https://cdn.simpleicons.org/cplusplus/white", desc: "古老的东西,只有竞赛用了", url: "#" },
            { name: "C#", ico: "https://cdn.simpleicons.org/c/white", desc: "为了开发Unity学习过<br><del>但是已经忘了</del>", url: "#" },
            { name: "Go", ico: "https://cdn.simpleicons.org/go/white", desc: "最近在学习的语言,非常喜欢", url: "#" },
            { name: "联系协作", ico: "https://cdn.simpleicons.org/gmail/white", desc: "欢迎通过邮件联系我", url: "mailto:yangyi@yearnstudio.cn" },
            { name: "Python", ico: "https://cdn.simpleicons.org/python/white", desc: "主力开发语言", url:"#"},
            { name: "HTML", ico: "https://cdn.simpleicons.org/html5/white", desc: "逃不开啊逃不开", url:"#"},
            { name: "CSS", ico: "https://cdn.simpleicons.org/css/white", desc: "Powered by AI", url:"#"},
            { name: "JavaScript", ico: "https://cdn.simpleicons.org/javascript/white", desc: "正在学习", url:"#"},
            { name: "1Panel", ico: "https://cdn.simpleicons.org/1panel/white", desc: "好看捏", url:"#"},
            { name: "Docker", ico: "https://cdn.simpleicons.org/docker/white", desc: "Docker Desktop什么<del>屎</del>", url:"#"},
            { name: "Debian", ico: "https://cdn.simpleicons.org/debian/white", desc: "在我写这个主页的时候<br>服务器正在安装", url:"#"},
            { name: "Cloudflare", ico: "https://cdn.simpleicons.org/cloudflare/white", desc: "Cloudflare怎么会崩...<br><del>不是真崩了?</del>", url:"#"},
            { name: "Gitlab CE", ico: "https://cdn.simpleicons.org/gitlab/white", desc: "自己部署丰衣足食", url:"#"},
            { name: "Git", ico: "https://cdn.simpleicons.org/git/white", desc: "老大哥", url:"#"},
        ];

        let isMobile = window.innerWidth < 768;
        let orbitRadii = isMobile ? [100, 160, 220] : [180, 280, 380]; 
        const orbitSpeeds = [0.004, -0.0025, 0.0018];
        const planets = [];

        function initOrbits() {
            const orbitsContainer = document.getElementById('orbits-container');
            orbitsContainer.innerHTML = '';
            orbitRadii.forEach(r => {
                const div = document.createElement('div');
                div.className = 'orbit';
                div.style.width = `${r * 2}px`;
                div.style.height = `${r * 2}px`;
                div.style.left = `-${r}px`;
                div.style.top = `-${r}px`;
                orbitsContainer.appendChild(div);
            });
        }

        function initPlanets() {
            const planetsContainer = document.getElementById('planets-container');
            planetsContainer.innerHTML = '';
            planets.length = 0;

            const planetsPerOrbit = [0, 0, 0];
            planetData.forEach((_, i) => planetsPerOrbit[i % orbitRadii.length]++);
            const orbitCounters = [0, 0, 0];

            planetData.forEach((data, index) => {
                const orbitIndex = index % orbitRadii.length;
                const radius = orbitRadii[orbitIndex];
                const speed = orbitSpeeds[orbitIndex];
                const totalOnThisOrbit = planetsPerOrbit[orbitIndex];
                const angleStep = (Math.PI * 2) / totalOnThisOrbit;
                const startAngle = orbitCounters[orbitIndex] * angleStep;
                orbitCounters[orbitIndex]++;

                const container = document.createElement('div');
                container.className = 'planet-container';
                const wrapper = document.createElement('div');
                wrapper.className = 'planet-wrapper';
                const icon = document.createElement('div');
                icon.className = 'planet-icon';
                icon.style.backgroundImage = `url('${data.ico}')`;

                if(isMobile) {
                    icon.style.width = '36px';
                    icon.style.height = '36px';
                }

                const card = document.createElement('div');
                card.className = 'planet-card';
                card.innerHTML = `
                    <div class="card-info">
                        <span class="font-bold text-xl">${data.name}</span>
                        <span class="text-sm opacity-60">${data.desc}</span>
                    </div>
                `;

                wrapper.appendChild(icon);
                wrapper.appendChild(card);
                container.appendChild(wrapper);
                planetsContainer.appendChild(container);

                const planetObj = {
                    element: container,
                    wrapper: wrapper,
                    card: card,
                    radius: radius,
                    speed: speed,
                    angle: startAngle,
                    isPaused: false,
                    isExpanded: false,
                    hoverTimer: null,
                    orbitIndex: orbitIndex,
                    url: data.url
                };

                wrapper.addEventListener('mouseenter', () => {
                    if(isMobile || physicsActive) return; 
                    planets.forEach(p => { if (p.orbitIndex === orbitIndex) p.isPaused = true; });
                    planetObj.hoverTimer = setTimeout(() => {
                        planetObj.isExpanded = true;
                        wrapper.classList.add('expanded');
                        document.body.classList.add('blur-active'); 
                    }, 400); 
                });

                wrapper.addEventListener('mouseleave', () => {
                    if(isMobile || physicsActive) return;
                    clearTimeout(planetObj.hoverTimer);
                    planetObj.isExpanded = false;
                    wrapper.classList.remove('expanded');
                    document.body.classList.remove('blur-active'); 
                    planets.forEach(p => { if (p.orbitIndex === orbitIndex) p.isPaused = false; });
                });

                wrapper.addEventListener('click', (e) => {
                    if (physicsActive) return; // 物理模式下禁用普通点击
                    if (isMobile) {
                        if (!planetObj.isExpanded) {
                            e.preventDefault();
                            planets.forEach(p => {
                                p.isExpanded = false;
                                p.wrapper.classList.remove('expanded');
                                p.isPaused = false;
                            });
                            planetObj.isExpanded = true;
                            wrapper.classList.add('expanded');
                            document.body.classList.add('blur-active');
                            planets.forEach(p => { if (p.orbitIndex === orbitIndex) p.isPaused = true; });
                        } else {
                            if (data.url && data.url !== '#') window.open(data.url, '_blank');
                        }
                    } else {
                        if (planetObj.isExpanded && data.url && data.url !== '#') {
                            window.open(data.url, '_blank');
                        }
                    }
                });

                planets.push(planetObj);
            });
        }

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const newIsMobile = window.innerWidth < 768;
                if (newIsMobile !== isMobile) {
                    isMobile = newIsMobile;
                    orbitRadii = isMobile ? [100, 160, 220] : [180, 280, 380]; 
                    initOrbits();
                    initPlanets();
                }
            }, 150);
        });

        document.addEventListener('click', (e) => {
            if (isMobile && !e.target.closest('.planet-wrapper') && !physicsActive) {
                planets.forEach(p => {
                    p.isExpanded = false;
                    p.wrapper.classList.remove('expanded');
                    p.isPaused = false;
                });
                document.body.classList.remove('blur-active');
            }
        });

        function animate() {
            if (physicsActive) return; // 物理模式激活时停止轨道动画
            planets.forEach(p => {
                if (!p.isPaused) { p.angle += p.speed; }
                const x = Math.cos(p.angle) * p.radius;
                const y = Math.sin(p.angle) * p.radius;
                p.element.style.transform = `translate(${x}px, ${y}px)`;

                if (isMobile) {
                    if (!p.isExpanded) {
                        if (x > 0) {
                            p.card.classList.add('expand-left');
                        } else {
                            p.card.classList.remove('expand-left');
                        }
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        /* ============================
           新功能：反重力模式 (延迟加载)
           ============================ */
        let physicsActive = false;
        let physicsLoaded = false;

        // 绑定触发事件：双击头像
        document.getElementById('avatar').addEventListener('dblclick', () => {
            if (physicsActive) return;
            
            if (physicsLoaded && typeof Matter !== 'undefined') {
                startAntiGravity();
            } else {
                console.log("物理引擎尚未加载完毕，请稍候...");
                // 简单的提示
                const avatar = document.getElementById('avatar');
                avatar.style.transform = "translate(-50%, -50%) scale(1.1)";
                setTimeout(() => avatar.style.transform = "translate(-50%, -50%) scale(1)", 200);
            }
        });

        // 异步加载脚本工具
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        // 启动物理引擎核心逻辑
        function startAntiGravity() {
            physicsActive = true;
            console.log("Starting Anti-Gravity Mode...");

            // 1. 初始化 Matter.js
            const { Engine, Render, Runner, MouseConstraint, Mouse, Composite, Bodies, Body } = Matter;
            const engine = Engine.create();
            engine.world.gravity.y = 0; // 无重力

            // 2. 创建画布
            const canvas = document.createElement('canvas');
            canvas.style.cssText = 'position:fixed; inset:0; z-index:1000; pointer-events:none;';
            document.body.appendChild(canvas);

            // 3. 配置渲染器 (Wireframes: false 以便我们自己绘图)
            const render = Render.create({
                canvas: canvas,
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // 4. 允许交互
            canvas.style.pointerEvents = 'auto'; // 接管鼠标事件
            const mouse = Mouse.create(canvas);
            const mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: { stiffness: 0.1, render: { visible: false } }
            });
            Composite.add(engine.world, mouseConstraint);

            // 5. 转换 DOM 到 Physics Body
            // 先隐藏 DOM 容器交互，防止重叠
            document.getElementById('page-wrapper').style.pointerEvents = 'none';
            document.getElementById('orbits-container').style.opacity = '0'; // 隐藏轨道线

            const bodies = [];
            
            // 定义要转换的元素
            // 注意：因为有 .shifted 变换，getBoundingClientRect 会自动获取变换后的绝对坐标，这是我们想要的
            const selectors = [
                { sel: '#avatar', shape: 'circle' }, // 头像
                { sel: '.planet-icon', shape: 'circle' }, // 只有图标，文字卡片忽略
                { sel: '.nav-btn', shape: 'rect' }, // 按钮
                { sel: 'h1', shape: 'rect' }, // 名字
                { sel: 'p', shape: 'rect' } // 介绍文字
            ];

            selectors.forEach(config => {
                document.querySelectorAll(config.sel).forEach(el => {
                    const rect = el.getBoundingClientRect();
                    // 过滤掉不可见的或太小的元素
                    if (rect.width === 0 || rect.height === 0) return;
                    // 过滤掉展开的卡片里的文字，只保留主界面的
                    if (el.closest('.planet-card')) return; 

                    const x = rect.left + rect.width / 2;
                    const y = rect.top + rect.height / 2;
                    let body;

                    if (config.shape === 'circle') {
                        // 稍微缩小碰撞体积，手感更好
                        body = Bodies.circle(x, y, rect.width / 2, { 
                            restitution: 0.9, 
                            frictionAir: 0.02 
                        });
                    } else {
                        body = Bodies.rectangle(x, y, rect.width, rect.height, { 
                            restitution: 0.6, 
                            frictionAir: 0.03 
                        });
                    }

                    // 抓取样式数据用于 Canvas 绘制
                    const style = window.getComputedStyle(el);
                    const isImg = el.tagName === 'IMG' || el.querySelector('img') || style.backgroundImage !== 'none';
                    let bgUrl = '';
                    
                    if (style.backgroundImage !== 'none') {
                        bgUrl = style.backgroundImage.slice(5, -2).replace(/"/g, "");
                    } else if (el.tagName === 'IMG') {
                        bgUrl = el.src;
                    } else if (el.querySelector('img')) {
                        bgUrl = el.querySelector('img').src;
                    }

                    body.userData = {
                        dom: el,
                        text: el.innerText,
                        isImg: isImg,
                        imgSrc: bgUrl,
                        color: style.color,
                        bgColor: style.backgroundColor, // 简化的背景色处理
                        fontSize: style.fontSize,
                        fontFamily: style.fontFamily,
                        fontWeight: style.fontWeight,
                        shape: config.shape
                    };

                    // 隐藏原元素
                    el.style.visibility = 'hidden';

                    // 施加初始随机冲力，模拟失重爆炸感
                    Body.applyForce(body, body.position, { 
                        x: (Math.random() - 0.5) * 0.025, 
                        y: (Math.random() - 0.5) * 0.025 
                    });

                    bodies.push(body);
                    Composite.add(engine.world, body);
                });
            });

            // 6. 启动引擎
            const runner = Runner.create();
            Runner.run(runner, engine);

            // 7. 自定义渲染循环
            (function renderLoop() {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                bodies.forEach(body => {
                    const { x, y } = body.position;
                    const data = body.userData;
                    
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(body.angle);

                    if (data.shape === 'circle' && data.isImg) {
                        // 绘制图标/头像
                        const r = body.circleRadius;
                        ctx.beginPath();
                        ctx.arc(0, 0, r, 0, Math.PI * 2);
                        ctx.clip(); // 裁剪成圆形
                        
                        // 绘制背景色 (特别是 GitHub 这种透明图标)
                        ctx.fillStyle = "#1a1a1a"; 
                        ctx.fill();

                        // 绘制图片
                        // 注意：这里实时创建 Image 可能会闪烁，最好预加载。
                        // 但由于浏览器有缓存，通常问题不大。为了简便直接绘制。
                        if(data.imgSrc) {
                            const img = new Image();
                            img.src = data.imgSrc;
                            // 保持比例绘制
                            ctx.drawImage(img, -r, -r, r*2, r*2);
                        }
                        
                        // 边框
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = "rgba(255,255,255,0.1)";
                        ctx.stroke();

                    } else {
                        // 绘制文字/按钮矩形
                        const w = body.bounds.max.x - body.bounds.min.x;
                        const h = body.bounds.max.y - body.bounds.min.y;
                        
                        ctx.fillStyle = "rgba(255,255,255,0.02)";
                        ctx.strokeStyle = "rgba(255,255,255,0.15)";
                        
                        // 绘制圆角矩形
                        ctx.beginPath();
                        if (ctx.roundRect) {
                            ctx.roundRect(-w/2, -h/2, w, h, 8);
                        } else {
                            ctx.rect(-w/2, -h/2, w, h);
                        }
                        ctx.fill();
                        ctx.stroke();

                        // 绘制文字
                        ctx.fillStyle = data.color;
                        ctx.font = `${data.fontWeight} ${data.fontSize} ${data.fontFamily}`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(data.text, 0, 0);
                    }
                    ctx.restore();

                    // 8. 边界循环处理 (Pac-man effect)
                    // 增加缓冲区，让物体完全飞出屏幕后再回来
                    const buffer = 100;
                    if (x > canvas.width + buffer) Body.setPosition(body, { x: -buffer, y });
                    if (x < -buffer) Body.setPosition(body, { x: canvas.width + buffer, y });
                    if (y > canvas.height + buffer) Body.setPosition(body, { x, y: -buffer });
                    if (y < -buffer) Body.setPosition(body, { x, y: canvas.height + buffer });
                });

                requestAnimationFrame(renderLoop);
            })();
        }

        /* ============================
           初始化流程
           ============================ */
        window.onload = () => {
            // 1. 正常的页面初始化
            initOrbits();
            initPlanets();
            animate();
            setTimeout(() => {
                document.body.classList.add('shifted');
            }, 500);

            // 2. 延迟加载物理引擎 (Deferred Loading)
            // 在页面完全加载完毕 2.5 秒后，网络空闲时下载库
            setTimeout(() => {
                console.log("准备后台加载物理引擎...");
                loadScript('https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js')
                    .then(() => {
                        physicsLoaded = true;
                        console.log("物理引擎已就绪 (双击头像启动)");
                    })
                    .catch(err => {
                        console.error("物理引擎加载失败", err);
                    });
            }, 2500); 
        };
    </script>
</body>
